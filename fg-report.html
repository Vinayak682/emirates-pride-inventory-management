<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FG Requests Report</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:#F5F3EF;color:#1A1A1A;padding:16px;}
.hdr{background:#1A1A1A;border-radius:12px 12px 0 0;padding:16px 20px;color:#fff;}
.hdr h1{font-size:18px;margin-bottom:4px;}
.hdr p{font-size:11px;color:#C9A44E;}
.panel{background:#fff;border:2px solid #E0DDD6;border-radius:12px;overflow:hidden;margin-bottom:16px;}
.toolbar{background:#FAFAF8;border-bottom:1px solid#E8E4DC;padding:12px 16px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.toolbar input{padding:8px 12px;border:1.5px solid #E0DDD6;border-radius:8px;font-size:13px;font-family:inherit;}
.toolbar button{background:#C9A44E;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer;}
.toolbar button:disabled{background:#CCC;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;padding:14px 16px;background:#F9F8F6;border-bottom:1px solid #E8E4DC;}
.stat{text-align:center;}
.stat-val{font-size:26px;font-weight:700;font-family:monospace;}
.stat-lbl{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;}
.tbl{width:100%;font-size:12px;border-collapse:collapse;}
.tbl thead{background:#1A1A1A;color:#fff;}
.tbl th{padding:10px 12px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:0.5px;font-weight:600;}
.tbl td{padding:10px 12px;border-bottom:1px solid #F0EDE6;}
.tbl tr:hover{background:rgba(0,0,0,0.02);}
.badge{display:inline-block;padding:3px 8px;border-radius:5px;font-size:9px;font-weight:700;text-transform:uppercase;}
.badge-pending{background:#FEF3C7;color:#92400E;}
.badge-approved{background:#D1FAE5;color:#065F46;}
.badge-rejected{background:#FEE2E2;color:#991B1B;}
.loading{text-align:center;padding:60px;color:#888;}
</style>
</head>
<body>
<div class="panel">
  <div class="hdr">
    <h1>FG to Tester Requests — Management Report</h1>
    <p>Emirates Pride Perfumes</p>
  </div>
  <div class="toolbar">
    <input type="date" id="dateFrom" placeholder="From">
    <input type="date" id="dateTo" placeholder="To">
    <button onclick="loadData()">🔄 Refresh</button>
    <button onclick="exportPDF()">📄 Export PDF</button>
    <button onclick="exportExcel()">📊 Export Excel</button>
  </div>
  <div class="stats" id="stats"></div>
  <div style="overflow-x:auto;">
    <table class="tbl" id="tbl">
      <thead><tr><th>Ref</th><th>Store</th><th>Employee</th><th>Items</th><th>Qty</th><th>Status</th><th>Submitted</th><th>Approved By</th></tr></thead>
      <tbody id="tbody"><tr><td colspan="8" class="loading">Loading...</td></tr></tbody>
    </table>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const SB_URL='https://ncszurcrkngjcjqsowln.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5jc3p1cmNya25namNqcXNvd2xuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NjA4NTgsImV4cCI6MjA5MzAzNjg1OH0.i5cPlP7JTTCKMXuFqI81WXbjQa71qBkRBZEBvNf6ZmM';
const sb=window.supabase.createClient(SB_URL,SB_KEY);
let allData=[];
async function loadData(){
  try{
    const{data,error}=await sb.from('fg_tester_requests').select('*').order('submitted_at',{ascending:false});
    if(error) throw error;
    allData=data||[];
    renderTable(allData);
    renderStats(allData);
  }catch(e){
    console.error(e);
    document.getElementById('tbody').innerHTML='<tr><td colspan="8" style="color:#EF4444;text-align:center;">Error: '+e.message+'</td></tr>';
  }
}
function renderStats(data){
  const pending=data.filter(r=>r.status==='pending').length;
  const approved=data.filter(r=>r.status==='approved').length;
  const rejected=data.filter(r=>r.status==='rejected').length;
  const totalQty=data.reduce((sum,r)=>sum+r.items.reduce((s,i)=>s+i.qty,0),0);
  document.getElementById('stats').innerHTML=
    '<div class="stat"><div class="stat-val" style="color:#F59E0B;">'+pending+'</div><div class="stat-lbl">Pending</div></div>'+
    '<div class="stat"><div class="stat-val" style="color:#22C55E;">'+approved+'</div><div class="stat-lbl">Approved</div></div>'+
    '<div class="stat"><div class="stat-val" style="color:#EF4444;">'+rejected+'</div><div class="stat-lbl">Rejected</div></div>'+
    '<div class="stat"><div class="stat-val">'+totalQty+'</div><div class="stat-lbl">Total Units</div></div>';
}
function renderTable(data){
  if(!data.length){
    document.getElementById('tbody').innerHTML='<tr><td colspan="8" style="text-align:center;color:#888;">No requests found</td></tr>';
    return;
  }
  let html='';
  data.forEach(r=>{
    const store=r.store_name.split('|')[0].trim();
    const itemCount=r.items.length;
    const totalQty=r.items.reduce((s,i)=>s+i.qty,0);
    const badge=r.status==='pending'?'badge-pending':r.status==='approved'?'badge-approved':'badge-rejected';
    html+='<tr>'+
      '<td style="font-family:monospace;font-size:11px;">'+r.request_ref+'</td>'+
      '<td>'+store+'</td>'+
      '<td>'+r.employee_name+'<br><span style="font-size:10px;color:#888;">'+r.employee_id+'</span></td>'+
      '<td>'+itemCount+' items</td>'+
      '<td><b>'+totalQty+'</b></td>'+
      '<td><span class="badge '+badge+'">'+r.status+'</span></td>'+
      '<td style="font-size:11px;">'+new Date(r.submitted_at).toLocaleDateString()+'</td>'+
      '<td style="font-size:11px;">'+(r.approved_by||'—')+'</td>'+
    '</tr>';
  });
  document.getElementById('tbody').innerHTML=html;
}
function exportPDF(){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF('l','mm','a4');
  doc.setFont('helvetica','bold');doc.setFontSize(16);
  doc.text('FG to Tester Requests Report',15,15);
  doc.setFontSize(10);doc.setFont('helvetica','normal');
  doc.text('Emirates Pride Perfumes — Generated: '+new Date().toLocaleString(),15,22);
  const rows=allData.map(r=>[
    r.request_ref,
    r.store_name.split('|')[0].trim(),
    r.employee_name+'\n'+r.employee_id,
    r.items.length+' items',
    r.items.reduce((s,i)=>s+i.qty,0),
    r.status.toUpperCase(),
    new Date(r.submitted_at).toLocaleDateString(),
    r.approved_by||'—'
  ]);
  doc.autoTable({
    startY:28,
    head:[['Ref','Store','Employee','Items','Qty','Status','Date','Approved By']],
    body:rows,
    styles:{fontSize:8},
    headStyles:{fillColor:[26,26,26]}
  });
  doc.save('FG_Tester_Requests_'+new Date().toISOString().split('T')[0]+'.pdf');
}
function exportExcel(){
  const rows=allData.map(r=>({
    'Ref':r.request_ref,
    'Store':r.store_name.split('|')[0].trim(),
    'Employee Name':r.employee_name,
    'Employee ID':r.employee_id,
    'Items Count':r.items.length,
    'Total Qty':r.items.reduce((s,i)=>s+i.qty,0),
    'Status':r.status.toUpperCase(),
    'Submitted':new Date(r.submitted_at).toLocaleString(),
    'Approved By':r.approved_by||'',
    'Rejection Reason':r.rejection_reason||''
  }));
  const ws=XLSX.utils.json_to_sheet(rows);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Requests');
  XLSX.writeFile(wb,'FG_Tester_Requests_'+new Date().toISOString().split('T')[0]+'.xlsx');
}
loadData();
</script>
</body>
</html>
