<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Approve FG Request</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:#F5F3EF;color:#1A1A1A;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:#fff;border:2px solid #E0DDD6;border-radius:14px;max-width:480px;width:100%;padding:24px;box-shadow:0 4px 20px rgba(0,0,0,0.08);}
.hdr{text-align:center;margin-bottom:20px;padding-bottom:16px;border-bottom:2px solid #E8E4DC;}
.hdr h1{font-size:19px;margin-bottom:6px;}
.hdr p{font-size:11px;color:#888;font-family:monospace;}
.info{background:#F9F8F6;border:1px solid #E8E4DC;border-radius:10px;padding:14px;margin-bottom:18px;}
.info .row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;}
.info .row span{color:#888;}
.info .row b{color:#1A1A1A;}
.section{font-weight:700;font-size:12px;color:#C9A44E;text-transform:uppercase;letter-spacing:1px;margin:16px 0 8px;}
.items{background:#FAFAF8;border:1px solid #E8E4DC;border-radius:8px;padding:12px;}
.items .item{padding:6px 0;border-bottom:1px solid #F0EDE6;font-size:13px;}
.items .item:last-child{border-bottom:none;}
.btns{display:flex;gap:10px;margin-top:20px;}
.btn{flex:1;padding:14px;border:none;border-radius:10px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.15s;}
.btn-approve{background:#22C55E;color:#fff;}
.btn-reject{background:#EF4444;color:#fff;}
.btn:disabled{background:#CCC;cursor:not-allowed;}
.done{display:none;text-align:center;padding:30px 20px;}
.done-icon{font-size:54px;margin-bottom:12px;}
.done h2{font-size:18px;margin-bottom:8px;}
.done p{font-size:13px;color:#888;}
.loading{text-align:center;padding:40px;}
.loading div{font-size:14px;color:#888;margin-top:12px;}
</style>
</head>
<body>
<div class="card" id="main">
  <div class="hdr">
    <h1>FG to Tester Request</h1>
    <p>Emirates Pride Perfumes</p>
  </div>
  <div class="loading" id="loading">
    <div style="font-size:32px;">⏳</div>
    <div>Loading request...</div>
  </div>
  <div id="content" style="display:none;">
    <div class="info" id="infoBox"></div>
    <div class="section">Items Requested</div>
    <div class="items" id="itemsList"></div>
    <div class="btns">
      <button class="btn btn-approve" id="approveBtn" onclick="doAction('approve')">✓ Approve</button>
      <button class="btn btn-reject" id="rejectBtn" onclick="doAction('reject')">✕ Reject</button>
    </div>
  </div>
  <div class="done" id="done">
    <div class="done-icon" id="doneIcon"></div>
    <h2 id="doneTitle"></h2>
    <p id="doneMsg"></p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SB_URL='https://ncszurcrkngjcjqsowln.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5jc3p1cmNya25namNqcXNvd2xuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NjA4NTgsImV4cCI6MjA5MzAzNjg1OH0.i5cPlP7JTTCKMXuFqI81WXbjQa71qBkRBZEBvNf6ZmM';
let sb;
const params=new URLSearchParams(window.location.search);
const ref=params.get('ref');
const action=params.get('action');
let requestData=null;

// Wait for Supabase SDK to load
window.addEventListener('load',()=>{
  if(typeof window.supabase==='undefined'){
    document.getElementById('loading').innerHTML='<div style="color:#EF4444;">Failed to load dependencies</div>';
    return;
  }
  sb=window.supabase.createClient(SB_URL,SB_KEY);
  loadRequest();
});

async function loadRequest(){
  if(!ref){
    document.getElementById('loading').innerHTML='<div style="color:#EF4444;">Invalid link - missing request reference</div>';
    return;
  }
  try{
    const{data,error}=await sb.from('fg_tester_requests').select('*').eq('request_ref',ref).single();
    if(error){
      console.error('Supabase error:',error);
      document.getElementById('loading').innerHTML='<div style="color:#EF4444;">Error loading request: '+error.message+'</div>';
      return;
    }
    if(!data){
      document.getElementById('loading').innerHTML='<div style="color:#EF4444;">Request not found</div>';
      return;
    }
    requestData=data;
    if(data.status!=='pending'){
      const statusIcon=data.status==='approved'?'✅':'❌';
      const statusTitle=data.status==='approved'?'Already Approved':'Already Rejected';
      const statusMsg='This request was '+data.status+' on '+new Date(data.approved_at).toLocaleString('en-GB')+' by '+data.approved_by;
      showDone(statusIcon,statusTitle,statusMsg);
      return;
    }
    const store=data.store_name.split('|')[0].trim();
    document.getElementById('infoBox').innerHTML=
      '<div class="row"><span>Ref</span><b>'+data.request_ref+'</b></div>'+
      '<div class="row"><span>Store</span><b>'+store+'</b></div>'+
      '<div class="row"><span>Employee</span><b>'+data.employee_name+' ('+data.employee_id+')</b></div>'+
      '<div class="row"><span>Submitted</span><b>'+new Date(data.submitted_at).toLocaleString('en-GB')+'</b></div>'+
      '<div class="row"><span>Status</span><b style="color:#F59E0B;">'+data.status.toUpperCase()+'</b></div>';
    let itemsHtml='';
    data.items.forEach((item,i)=>{
      const prodName=item.product.split('|')[0].trim();
      itemsHtml+='<div class="item">'+(i+1)+'. '+prodName+' <b>×'+item.qty+'</b></div>';
    });
    document.getElementById('itemsList').innerHTML=itemsHtml;
    document.getElementById('loading').style.display='none';
    document.getElementById('content').style.display='block';
    if(action==='approve') document.getElementById('rejectBtn').style.display='none';
    if(action==='reject') document.getElementById('approveBtn').style.display='none';
  }catch(e){
    console.error('Load error:',e);
    document.getElementById('loading').innerHTML='<div style="color:#EF4444;">Error: '+e.message+'</div>';
  }
}

async function doAction(act){
  const approver=prompt('Your name (for audit trail):','');
  if(!approver||!approver.trim()){
    alert('Name is required');
    return;
  }
  let reason='';
  if(act==='reject'){
    reason=prompt('Rejection reason:','');
    if(!reason||!reason.trim()){
      alert('Rejection reason is required');
      return;
    }
  }
  const btns=document.querySelectorAll('.btn');
  btns.forEach(b=>b.disabled=true);
  try{
    const update={
      status:act==='approve'?'approved':'rejected',
      approved_by:approver.trim(),
      approved_at:new Date().toISOString()
    };
    if(act==='reject') update.rejection_reason=reason.trim();
    
    const{error}=await sb.from('fg_tester_requests').update(update).eq('request_ref',ref);
    if(error){
      console.error('Update error:',error);
      throw new Error(error.message);
    }
    
    const statusIcon=act==='approve'?'✅':'❌';
    const statusTitle=act==='approve'?'Request Approved':'Request Rejected';
    const statusMsg='The store will be notified. You can close this window now.';
    showDone(statusIcon,statusTitle,statusMsg);
  }catch(e){
    console.error('Action error:',e);
    alert('Error: '+e.message);
    btns.forEach(b=>b.disabled=false);
  }
}

function showDone(icon,title,msg){
  document.getElementById('loading').style.display='none';
  document.getElementById('content').style.display='none';
  document.getElementById('doneIcon').textContent=icon;
  document.getElementById('doneTitle').textContent=title;
  document.getElementById('doneMsg').textContent=msg;
  document.getElementById('done').style.display='block';
}
</script>
</body>
</html>
